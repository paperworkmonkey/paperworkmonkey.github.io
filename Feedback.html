<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/favicon.png" />
    <title>ICUonline</title>
    <link rel="stylesheet" type="text/css" href="index.css" />
    <script src="p5.min.js"></script>
  </head>

  <body style="font-family: Verdana">
    <div id="headerPlaceholder"></div>

    <style>
      body {
        font-family: Verdana, sans-serif;
        background-color: #f4f6f9;
        /* margin: auto; */
        /* padding: 40px 20px; */
      }

      .feedback-container {
        max-width: 700px;
        margin: 0;
        background: #ffffff;
        padding: 30px 35px;
        border-radius: 10px;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
      }

      .feedback-container h3 {
        margin-top: 0;
        font-size: 1.6rem;
        color: #2c3e50;
      }

      .feedback-container p {
        color: #555;
        line-height: 1.6;
        margin-bottom: 25px;
      }

      .form-group {
        margin-bottom: 18px;
      }

      label {
        display: block;
        font-weight: 600;
        margin-bottom: 6px;
        color: #333;
      }

      input,
      textarea {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 0.95rem;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }

      input:focus,
      textarea:focus {
        border-color: #4a90e2;
        outline: none;
        box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.15);
      }

      textarea {
        resize: vertical;
      }

      button {
        background-color: #4a90e2;
        color: white;
        border: none;
        padding: 10px 18px;
        border-radius: 6px;
        font-size: 0.95rem;
        cursor: pointer;
        transition:
          background-color 0.2s,
          transform 0.1s;
      }

      button:hover {
        background-color: #357abd;
      }

      button:active {
        transform: scale(0.98);
      }
    </style>

    <div class="feedback-container">
      <h3>Leave some feedback</h3>
      <p>
        Please use this form to give feedback — especially if there are problems
        or errors — but also ideas for development and any improvements needed.
        It’s really appreciated.
      </p>

      <form action="https://formspree.io/f/xjkavrvr" method="POST">
        <div class="form-group">
          <label for="email">Your email</label>
          <input type="email" id="email" name="email" required />
        </div>

        <div class="form-group">
          <label for="message">Your feedback</label>
          <textarea id="message" name="message" rows="6" required></textarea>
        </div>

        <button type="submit">Submit feedback</button>
      </form>
    </div>

    <script>
      function setup() {
        fetch("PageTopNGFeed.html")
          .then((response) => response.text())
          .then((data) => {
            document.getElementById("headerPlaceholder").innerHTML = data;

            const page = document.getElementById("feedback");

            if (page) {
              page.className = "btn-link btn-primary";
            }
          });

        noCanvas();
      }
    </script>
  </body>
</html>
