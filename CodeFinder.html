<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/favicon.png" />
    <title>ICNARC code finder</title>
    <link rel="stylesheet" href="CodeFinder.css" />
    <script src="p5.min.js"></script>
  </head>

  <body style="font-family: Verdana">
    <div id="headerPlaceholder"></div>

    <h3>ICNARC code finder</h3>

    <p style="font-size: small; color: grey">
      This search box allows completion mapping. e.g. you can search for "oes
      var" or "sm bow obs", or "bow ob smal" etc.
    </p>

    <!-- <div class="searchRow"></div> -->

    <div id="buttons_grid" class="buttons_grid">
      <div class="searchBox">
        <label for="inputValue">Search for: </label>
        <input
          type="text"
          id="inputValue"
          autocomplete="off"
          oninput="getSearchTerm()"
        />
      </div>

      <div class="copy_buttons">
        <button type="button" class="copyButtons" onclick="copy_code()">
          Copy code
        </button>
        <button type="button" class="copyButtons" onclick="copy_condition()">
          Copy condition and code
        </button>
        <button type="button" class="copyButtons" onclick="copy_all()">
          Copy All
        </button>
      </div>

      <div class="selectedBox">
        <div id="selectedContent">Click a row...</div>
      </div>
    </div>

    <div class="myGrid">
      <div class="topLines">System</div>
      <div class="topLines">Site</div>
      <div class="topLines">Process</div>
      <div class="topLines">Condition</div>
      <div class="topLines">Code</div>
      <!-- <div class="topLines">Unique code</div> -->
      <div id="resultsContainer" class="resultsContainer"></div>
    </div>
    <script src="CodeFinder.js"></script>
  </body>
</html>
